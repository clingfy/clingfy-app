name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: macos-latest

    env:
      APP_ENV: ${{ github.base_ref == 'develop' && 'dev' || 'prod' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Xcode and Swift
        run: |
          xcodebuild -version
          swift --version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.1
          channel: stable

      - name: Resolve app version
        run: |
          set -euo pipefail
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          APP_VERSION="${VERSION_LINE%%+*}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_ENV"

      - name: Flutter pub get
        run: flutter pub get

      - name: Debug project layout
        run: |
          set -euo pipefail
          pwd
          git rev-parse HEAD
          ls -la
          ls -la macos
          test -f .metadata && echo ".metadata exists"
          test -f macos/Runner.xcodeproj/project.pbxproj && echo "Runner.xcodeproj exists"
          sed -n '1,80p' .metadata

      - name: Validate Flutter/macOS toolchain
        run: |
          flutter --version
          flutter doctor -v
          flutter devices
          flutter precache --macos

      - name: Compile macOS app (unsigned validation build)
        run: |
          set -euo pipefail

          flutter build macos \
            --debug \
            --config-only \
            --flavor "$APP_ENV" \
            --build-name "$APP_VERSION" \
            --build-number "$BUILD_NUMBER" \
            --dart-define=APP_ENV=$APP_ENV

          echo "Creating empty xcfilelist files to satisfy Xcode's build planner..."
          mkdir -p macos/Flutter/ephemeral
          touch macos/Flutter/ephemeral/FlutterInputs.xcfilelist
          touch macos/Flutter/ephemeral/FlutterOutputs.xcfilelist

          cd macos
          pod install --repo-update
          cd ..

          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme "$APP_ENV" \
            -configuration "Debug-$APP_ENV" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clingfy-CI
          path: build/macos