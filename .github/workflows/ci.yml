name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: macos-latest

    env:
      APP_ENV: ${{ github.base_ref == 'develop' && 'dev' || 'prod' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Xcode and Swift
        run: |
          xcodebuild -version
          swift --version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.1
          channel: stable

      - name: Resolve app version
        run: |
          set -euo pipefail
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          APP_VERSION="${VERSION_LINE%%+*}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_ENV"

      - name: Flutter pub get
        run: flutter pub get

      - name: Verify macOS host project files
        run: |
          set -euo pipefail
          test -f macos/Runner.xcodeproj/project.pbxproj
          test -f macos/Runner.xcworkspace/contents.xcworkspacedata
          test -f macos/Runner.xcodeproj/xcshareddata/xcschemes/${APP_ENV}.xcscheme
          grep -q "Debug-${APP_ENV}" macos/Runner.xcodeproj/project.pbxproj
          grep -q "Profile-${APP_ENV}" macos/Runner.xcodeproj/project.pbxproj
          grep -q "Release-${APP_ENV}" macos/Runner.xcodeproj/project.pbxproj

      - name: Install CocoaPods
        run: |
          set -euo pipefail
          cd macos
          pod install --repo-update
          xcodebuild -list -workspace Runner.xcworkspace

      - name: Generate Flutter macOS configs
        run: |
          set -euo pipefail
          flutter build macos \
            --debug \
            --config-only \
            --flavor "$APP_ENV" \
            --build-name "$APP_VERSION" \
            --build-number "$BUILD_NUMBER" \
            --dart-define=APP_ENV=$APP_ENV

      - name: Compile macOS app (unsigned validation build)
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme "$APP_ENV" \
            -configuration "Debug-$APP_ENV" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clingfy-CI
          path: build/macos